name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Django, migrations, tests and OpenAPI
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Backend
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_NAME: gahambani_ci
      DATABASE_USER: gahambani_ci
      DATABASE_PASSWORD: ci-database-password-not-a-secret
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "5432"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gahambani_ci
          POSTGRES_USER: gahambani_ci
          POSTGRES_PASSWORD: ci-database-password-not-a-secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gahambani_ci -d gahambani_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Check installed dependency consistency
        run: python -m pip check

      - name: Check Git whitespace
        run: git diff --check

      - name: Run Django system checks
        run: python manage.py check --settings=config.settings.test

      - name: Reject missing migrations
        run: python manage.py makemigrations --check --dry-run --settings=config.settings.test

      - name: Rebuild an empty PostgreSQL database
        run: python manage.py migrate --noinput --settings=config.settings.test

      - name: Run the complete test suite
        run: python manage.py test --settings=config.settings.test

      - name: Validate and generate OpenAPI v1
        run: >-
          python manage.py spectacular --validate
          --file "${RUNNER_TEMP}/openapi-v1.generated.yaml"
          --settings=config.settings.test

      - name: Compare the OpenAPI snapshot structurally
        run: >-
          python -c "import os, pathlib, yaml;
          expected=yaml.safe_load(pathlib.Path('openapi-v1.yaml').read_text(encoding='utf-8'));
          generated=yaml.safe_load(pathlib.Path(os.environ['RUNNER_TEMP'], 'openapi-v1.generated.yaml').read_text(encoding='utf-8'));
          assert generated == expected, 'openapi-v1.yaml is not up to date'"

  production-config:
    name: Production configuration check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: Backend
    env:
      DJANGO_SECRET_KEY: ci-only-production-check-key-abcdefghijklmnopqrstuvwxyz-1234567890
      DJANGO_ALLOWED_HOSTS: api-ci.example.invalid
      DJANGO_CSRF_TRUSTED_ORIGINS: https://api-ci.example.invalid
      DJANGO_CORS_ALLOWED_ORIGINS: https://app-ci.example.invalid
      FRONTEND_RESET_PASSWORD_URL: https://app-ci.example.invalid/reset-password/confirm
      DATABASE_NAME: ci-production-check
      DATABASE_USER: ci-production-check
      DATABASE_PASSWORD: ci-database-password-not-a-secret
      DATABASE_HOST: db.example.invalid
      DATABASE_PORT: "5432"
      DATABASE_SSLMODE: require
      DJANGO_EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      DJANGO_EMAIL_HOST: smtp.example.invalid
      DJANGO_EMAIL_PORT: "587"
      DJANGO_EMAIL_HOST_USER: ci-production-check
      DJANGO_EMAIL_HOST_PASSWORD: ci-email-password-not-a-secret
      DJANGO_EMAIL_USE_TLS: "true"
      DJANGO_EMAIL_USE_SSL: "false"
      DJANGO_DEFAULT_FROM_EMAIL: ci@example.invalid
      DJANGO_TRUST_X_FORWARDED_PROTO: "true"
      ALERT_THRESHOLDS_MEDICALLY_VALIDATED: "true"
      ALERT_BP_VERY_LOW_SYSTOLIC: "90"
      ALERT_BP_VERY_LOW_DIASTOLIC: "60"
      ALERT_BP_ELEVATED_SYSTOLIC: "140"
      ALERT_BP_ELEVATED_DIASTOLIC: "90"
      ALERT_BP_VERY_HIGH_SYSTOLIC: "180"
      ALERT_BP_VERY_HIGH_DIASTOLIC: "120"
      ALERT_BP_CRITICAL_SYSTOLIC: "180"
      ALERT_BP_CRITICAL_DIASTOLIC: "120"
      ALERT_HR_LOW: "40"
      ALERT_HR_HIGH: "130"
      ALERT_GLUCOSE_VERY_LOW_MG_DL: "54"
      ALERT_GLUCOSE_HIGH_MG_DL: "180"
      ALERT_GLUCOSE_VERY_HIGH_MG_DL: "250"
      ALERT_HBA1C_HIGH_PERCENT: "8"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run Django deployment checks without external connections
        run: python manage.py check --deploy --settings=config.settings.production
