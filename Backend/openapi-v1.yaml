  /api/v1/analytics/trends/:
    get:
      operationId: api_v1_analytics_trends_retrieve
      description: Compare deux fenêtres consécutives de sept jours. INSufficient
        data sous le minimum configurable. Ne qualifie jamais médicalement la variation.
      summary: Tendances descriptives
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
        description: Borne UTC inclusive ISO 8601.
      - in: query
        name: date_to
        schema:
          type: string
