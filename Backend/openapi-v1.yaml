openapi: 3.0.3
info:
  title: GahamBani API
  version: 1.0.0
  description: Documentation de l'API GahamBani. Le Domaine 1 couvre l'authentification
    et la gestion du compte utilisateur.
paths:
  /api/v1/alerts/:
    get:
      operationId: api_v1_alerts_list
      summary: Lister les alertes accessibles
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
      - in: query
        name: date_to
        schema:
          type: string
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -detected_at
          - -severity
          - detected_at
          - severity
      - in: query
        name: page
        schema:
          type: integer
      - in: query
        name: page_size
        schema:
          type: integer
        description: Maximum 100.
      - in: query
        name: patient_id
        schema:
          type: string
          format: uuid
        description: Médecins uniquement.
      - in: query
        name: rule_code
        schema:
          type: string
      - in: query
        name: severity
        schema:
          type: string
          enum:
          - CRITICAL
          - HIGH
          - INFO
          - LOW
          - MEDIUM
      - in: query
        name: status
        schema:
          type: string
          enum:
          - ACKNOWLEDGED
          - DISMISSED
          - OPEN
          - RESOLVED
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMedicalAlertList'
          description: ''
        '400':
          description: Filtre, transition ou motif invalide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '401':
          description: Authentification JWT requise.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '403':
          description: Rôle ou affectation insuffisante.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: Alerte inexistante ou inaccessible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '405':
          description: Méthode désactivée.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/alerts/{id}/:
    get:
      operationId: api_v1_alerts_retrieve
      summary: Consulter une alerte
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this medical alert.
        required: true
      tags:
      - Alerts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalAlert'
          description: ''
        '400':
          description: Filtre, transition ou motif invalide.
