  /api/v1/auth/change-password/:
    post:
      operationId: auth_change_password
      description: Change the authenticated user's password after validating the old
        one.
      summary: Changer son mot de passe
      tags:
      - Domaine 1 - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          description: Requête invalide ou erreur de validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '401':
          description: Authentification JWT requise ou invalide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '429':
          description: Limite de requêtes dépassée. Le délai est indiqué par DRF lorsque
            disponible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/auth/login/:
    post:
      operationId: auth_login
      description: Authentifie un utilisateur par e-mail et retourne une paire de
        jetons JWT.
      summary: Se connecter
      tags:
      - Domaine 1 - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '400':
          description: Requête invalide ou erreur de validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '429':
          description: Limite de requêtes dépassée. Le délai est indiqué par DRF lorsque
            disponible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout
