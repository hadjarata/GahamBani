  /api/v1/analytics/alerts/:
    get:
      operationId: api_v1_analytics_alerts_retrieve
      description: Aucun message médical complet n’est renvoyé.
      summary: Résumé analytique des alertes
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
        description: Borne UTC inclusive ISO 8601.
      - in: query
        name: date_to
        schema:
          type: string
        description: Borne UTC inclusive ISO 8601.
      - in: query
        name: patient_id
        schema:
          type: string
          format: uuid
        description: Obligatoire pour un médecin; interdit au patient.
      - in: query
        name: period
        schema:
          type: string
          enum:
          - 1y
          - 30d
          - 6m
          - 7d
          - 90d
          - custom
        description: 30d par défaut. custom exige les deux dates.
      tags:
      - Analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsAnalytics'
          description: ''
        '400':
          description: Paramètres temporels ou analytiques invalides.
          content:
            application/json:
              schema:
