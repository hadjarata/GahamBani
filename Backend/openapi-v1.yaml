  /api/v1/analytics/blood-glucose/:
    get:
      operationId: api_v1_analytics_blood_glucose_retrieve
      description: Toutes les valeurs analytiques sont en MG_PER_DL (1 g/L = 100 mg/dL).
      summary: Série de glycémie normalisée
      parameters:
      - in: query
        name: context
        schema:
          type: string
          enum:
          - AFTER_MEAL
          - BEFORE_MEAL
          - NO_MEAL
      - in: query
        name: date_from
        schema:
          type: string
        description: Borne UTC inclusive ISO 8601.
      - in: query
        name: date_to
        schema:
          type: string
        description: Borne UTC inclusive ISO 8601.
      - in: query
        name: granularity
        schema:
          type: string
          enum:
          - day
          - month
          - raw
          - week
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - asc
          - desc
      - in: query
        name: page
        schema:
          type: integer
        description: Séries raw uniquement.
      - in: query
        name: page_size
        schema:
          type: integer
        description: Séries raw uniquement, maximum 100.
      - in: query
        name: patient_id
        schema:
          type: string
          format: uuid
        description: Obligatoire pour un médecin; interdit au patient.
      - in: query
