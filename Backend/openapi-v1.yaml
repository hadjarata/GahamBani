          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAlertTransitionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAlertTransitionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAlertTransitionRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
